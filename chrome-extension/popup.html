<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <svg class="shield-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.66 0 3 1.34 3 3 0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3zm0 12.2c-2.7 0-5.02-1.37-6.36-3.44.04-2.1 4.24-3.26 6.36-3.26 2.1 0 6.32 1.16 6.36 3.26-1.34 2.07-3.66 3.44-6.36 3.44z"/>
      </svg>
      <h1>SecureGate <span>AI</span></h1>
    </header>

    <div class="divider"></div>

    <!-- Login Form View -->
    <div id="login-view" class="view">
      <h3>Admin Authentication</h3>
      <div id="login-error" class="alert error hidden"></div>
      <input type="text" id="username" placeholder="Username" value="admin">
      <input type="password" id="password" placeholder="Password" value="admin">
      <button id="login-btn">Connect Gateway</button>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view hidden">
      <div class="status-badge">
        <span class="pulse-dot"></span>
        <span>PROTECTION ACTIVE</span>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Blocked Attacks</span>
          <span class="stat-val" id="blocked-count">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Allowed Traffic</span>
          <span class="stat-val" id="allowed-count">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Blacklist Size</span>
          <span class="stat-val" id="blacklist-size">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Whitelist Size</span>
          <span class="stat-val" id="whitelist-size">0</span>
        </div>
      </div>

      <!-- Top Attacker Box -->
      <div class="attacker-box">
        <div class="attacker-label">Top Threat Source IP</div>
        <div class="attacker-ip" id="top-attacker-ip">None</div>
        <div class="attacker-count">Attacks Blocked: <span id="top-attacker-count">0</span></div>
      </div>

      <!-- Quick Toggles -->
      <div class="toggles-box">
        <h4>Threat Protection Settings</h4>
        <div class="toggle-row">
          <span>Email Alerts</span>
          <label class="switch">
            <input type="checkbox" id="email-alerts-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Logout -->
      <button id="logout-btn" class="secondary">Disconnect Console</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
