# =========================================================================
# SecureGate AI - Nginx Integration Configuration Template
# =========================================================================
#
# This configuration demonstrates how small organizations can shield their
# application server using Nginx's auth_request module.
#
# Incoming visitor requests are checked against the SecureGate AI decision
# engine first. If the IP is blocked, Nginx drops the connection immediately
# before it ever reaches your actual Node.js, Python, or PHP application server.
#
# Requirements:
# Nginx compiled with --with-http_auth_request_module (included by default
# on most standard installations like Ubuntu/CentOS).
# =========================================================================

events {
    worker_connections 1024;
}

http {
    # Define upstream actual application server
    upstream my_app_backend {
        server 127.0.0.1:3000; # Replace with your Node/PHP/Python port
    }

    # Define upstream SecureGate AI security gateway
    upstream securegate_gateway {
        server 127.0.0.1:8080; # Our Spring Boot backend port
    }

    server {
        listen 80;
        server_name mycompany.com;

        # Main entry point for website traffic
        location / {
            # 1. Ask SecureGate AI if client IP is permitted
            auth_request /_securegate_check;

            # 2. If allowed, proxy traffic to the actual application backend
            proxy_pass http://my_app_backend;
            
            # Forward standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Subrequest endpoint to verify access with SecureGate AI
        location = /_securegate_check {
            internal;
            
            # Call our check API (maps internally to http://localhost:8080/api/check/{ip})
            # In Nginx, we can pass the real client IP as a header
            proxy_pass http://securegate_gateway/api/check;
            
            # Keep subrequest body empty to save bandwidth
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            # Pass the client IP details to the gateway
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Custom error page when SecureGate AI blocks the user (403 Forbidden)
        error_page 403 = @blocked_by_securegate;

        location @blocked_by_securegate {
            default_type application/json;
            return 403 '{"status":"BLOCKED","reason":"Access Denied by SecureGate AI Protection Gateway. Your IP is blacklisted or belongs to a restricted country/subnet."}';
        }
    }
}
